name: Claude Issue Formatter

on:
  issues:
    types: [opened, edited]

jobs:
  format-issue:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Format issue with Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--allowedTools Bash(gh issue *)"
          prompt: |
            You are a GitHub issue formatter for a Tetris game project (vanilla JS/HTML/CSS, no dependencies).

            An issue was just ${{ github.event.action }} with the following details:
            - Issue number: #${{ github.event.issue.number }}
            - Title: ${{ github.event.issue.title }}
            - Body: ${{ github.event.issue.body }}
            - Author: ${{ github.event.issue.user.login }}

            Your tasks:
            1. **Add labels** based on the issue content. Use only these labels:
               - `bug` — something is broken or behaving incorrectly
               - `enhancement` — new feature or improvement request
               - `question` — asking for help or clarification
               - `documentation` — docs need updating
               - `good first issue` — simple, beginner-friendly task
               - `duplicate` — if it seems like a known/repeated problem

            2. **Post a comment** on the issue that includes:
               - A brief, friendly summary of what the issue is about (1-2 sentences)
               - A "Formatted Report" section with:
                 - **Type**: Bug / Feature Request / Question / Other
                 - **Summary**: one clear sentence describing the problem or request
                 - **Steps to reproduce** (for bugs): list them if not provided, ask the user to provide them if it's a bug
                 - **Expected behavior** (for bugs): what should happen
                 - **Suggested labels**: the labels you applied and why
               - A closing note thanking the contributor

            Use the `gh` CLI to apply labels and post the comment. Follow these steps in order:

            **Step 1 — Ensure labels exist** before applying them. For each label you plan to use, run:
              gh label create "bug" --color "d73a4a" --description "Something isn't working" --repo ${{ github.repository }} --force
              gh label create "enhancement" --color "a2eeef" --description "New feature or request" --repo ${{ github.repository }} --force
              gh label create "question" --color "d876e3" --description "Further information is requested" --repo ${{ github.repository }} --force
              gh label create "documentation" --color "0075ca" --description "Improvements or additions to documentation" --repo ${{ github.repository }} --force
              gh label create "good first issue" --color "7057ff" --description "Good for newcomers" --repo ${{ github.repository }} --force
              gh label create "duplicate" --color "cfd3d7" --description "This issue or pull request already exists" --repo ${{ github.repository }} --force

            Only create the labels you will actually use. The `--force` flag updates the label if it already exists.

            **Step 2 — Apply labels** to the issue:
              gh issue edit ${{ github.event.issue.number }} --add-label "bug" --repo ${{ github.repository }}

            **Step 3 — Post a comment** using valid GitHub Flavored Markdown (GFM). The comment body must:
              - Use `##` and `###` for section headings
              - Use `**bold**` for field names
              - Use `-` or `1.` for lists
              - Use `>` for blockquotes if quoting the user
              - Use backticks for inline code if referencing code
              - NOT include raw HTML tags
              - Be properly escaped so `gh issue comment` receives it as a single string

              gh issue comment ${{ github.event.issue.number }} --body "$(cat <<'COMMENT'
            ## Resumen del Issue

            <friendly summary here>

            ### Reporte Formateado

            **Tipo:** Bug / Feature Request / Question / Other
            **Resumen:** one clear sentence

            **Pasos para reproducir** *(solo para bugs)*:
            1. Step one
            2. Step two

            **Comportamiento esperado:** what should happen

            **Labels aplicados:** `bug` — reason why

            ---
            Gracias por tu contribución! 🙌
            COMMENT
            )" --repo ${{ github.repository }}

            Be concise, helpful, and friendly. Do not over-engineer the response.
